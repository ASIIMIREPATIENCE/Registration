<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registration form 2</title>
    <link rel="stylesheet" href="../styles/sales-reg.css" />
  </head>
  <style>

body {
  background-color: #ccc;
}

.container {
  background-color: #ccc;
  display: flex;
  width: 100%;
  height: 100vh;
}

.sidebar {
  height: 100vh;
  flex: 1;
  color: #fff;
  display: flex;
  flex-direction: column;
  padding: 20px;
  text-decoration: none;
}
.nav {
  text-decoration: none;
}

.sidebar a {
  background-color: #296c8ed2;
  color: #193333;
  padding: 30px 0;
  display: block;
  border: 1px solid silver;
  border-radius: 10px;
  font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
  font-size: 25px;
  text-decoration: none;
}

.sidebar a:hover {
  background: #338280;
  padding-left: 5px;
}

.content {
  height: 100vh;
  flex: 3;
  padding: 20px;
  background: #ccc;
  text-align: center;
}

.input-container {
  display: flex;
  gap: 20px;
  margin-bottom: 20px;
}

.input-section {
  flex: 1;
  display: flex;
  flex-direction: column;
}

.input-section label {
  margin-bottom: 5px;
  font-weight: bold;
}

.input-section input {
  padding: 8px;
  border: 1px solid #ccc;
  border-radius: 4px;
}

.input-section select {
  padding: 8px;
  border: 1px solid #ccc;
  border-radius: 4px;
}

.button {
  color: #181e47;
  padding: 10px 25px;
  font-size: 16px;
  font-weight: 600;
  border-radius: 6px;
  cursor: pointer;
  gap: 20px;
}

button:hover {
  background-color: #1f6169;
  transform: translateY(-2px); /* Slight lift effect */
}

.sales-form {
  max-width: 600px;
  margin: 1px solid #38598b;
  border: 5px solid #181e47;
  border-radius: 10px;
  padding: 20px;
  background: -webkit-repeating-linear-gradient(#53a8b6, #5585b5);
}

.profile2 {
  width: 100%;
  border-radius: 60px;
  margin: 10px;
  height: 100px;
  background-color: aqua;
}


  </style>
  <body>
    <div class="container">
      <div class="sidebar">
        <div class="profile">
          <div class="profile2"></div>
        </div>
        <div class="nav">
          <div><a href="dashboard.html">Dashboard</a></div>
          <div><a href="stock.html">Stock</a></div>
          <div><a href="sales.html">Sales</a></div>
          <div><a href="profit.html">Profit</a></div>
          <div><a href="documwntation.html">Documentation</a></div>
        </div>
      </div>

      <div class="content">
        <form class="sales-form">
          <section>
            <h1>Sales Registration</h1>
            <div class="input-container">
              <div class="input-section">
                <label for="sales-date">Sales Date</label>
                <input type="date" id="sales-date" required />
              </div>
              <div class="input-section">
                <label for="sales-person">Sales Person</label>
                <select id="sales-person" required>
                  <option>Select Attendant</option>
                  <option>Drake Aribariho</option>
                  <option>Joan Chelimo</option>
                  <option>Ken Ojok</option>
                  <option>Tom Okello</option>
                  <option>Joe Banks</option>
                </select>
              </div>
            </div>
          </section>

          <section>
            <h1>Customer Details</h1>
            <div class="input-container">
              <div class="input-section">
                <label for="customer-name">Full Name</label>
                <input
                  type="text"
                  id="cust-name"
                  placeholder="Insert Full Name"
                />
              </div>
              <div class="input-section">
                <label for="customer-phone">Phone Number</label>
                <input
                  type="tel"
                  id="cust-phone"
                  placeholder="Insert phone number"
                  required
                />
              </div>
            </div>

            <div class="input-container">
              <div class="input-section">
                <label for="customer-email">Email</label>
                <input type="email" id="cust-email" placeholder="Enter email" />
              </div>
              <div class="input-section">
                <label for="cust-type">Customer Type</label>
                <select id="cust-type" required>
                  <option>Select Customer Type</option>
                  <option>Retail</option>
                  <option>Wholesale</option>
                </select>
              </div>
            </div>
          </section>

          <section>
            <h1>Items</h1>
            <div class="input-container">
              <div class="input-section">
                <label for="product 1">Product</label>
                <input
                  type="text"
                  id="product 1"
                  required
                  placeholder="Input Product"
                />
              </div>
              <div class="input-section">
                <label for="quantity1">Quantity</label>
                <input type="text" id="quantity1" required />
              </div>
              <div class="input-section">
                <label for="price1">Unit Price</label>
                <input type="text" id="price1" required />
              </div>
            </div>

            <div class="input-container">
              <div class="input-section">
                <label for="product 2">Product</label>
                <input
                  type="text"
                  id="prdt2"
                  required
                  placeholder="Input Product"
                />
              </div>
              <div class="input-section">
                <label for="quantity2">Quantity</label>
                <input type="text" id="quantity2" required />
              </div>
              <div class="input-section">
                <label for="price2">Unit Price</label>
                <input type="text" id="price2" required />
              </div>
            </div>

            <div>
              <button type="reset" class="button">Cancel</button>
              <button type="submit" class="button">Submit</button>
            </div>
          </section>
        </form>
      </div>
    </div>
  </body>
</html>
