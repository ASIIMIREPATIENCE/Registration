<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Stock-Registration</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<style>
  .card {
    border-radius: 10px;
    background-color: rgb(239, 233, 223);
    box-shadow: 4px 15px rgba(0, 0, 0, 0.1);

  }
  .form {
    border-radius: 10px;
    background-color: rgb(236, 232, 226);
    box-shadow: 4px 15px rgba(0, 0, 0, 0.1);

  }

  .sidebar {
    width: 260px;
    background-color: #3a4750;
    color: white;
    padding: 20px;
    position: fixed;
    height: 100%;
    display: block;

  }

  .profile {
    text-align: center;
    margin-bottom: 30px;
  }

  .profile2 {
    width: 80px;
    height: 80px;
    background-color: #ecf0f1;
    border-radius: 50%;
    margin: 0 auto;
    border: 3px solid #3498db;
  }

  .nav div {
    margin: 15px 0;
  }

  .nav a {
    color: white;
    text-decoration: none;
    font-weight: 500;
    /* transition: 0.3s; */
    display: block;
    padding: 10px;
    border-radius: 4px;
  }

  .nav a:hover {
    background-color: #2980b9;
    color: white;
  }
</style>

<body>
  <div class="container-fluid">
    <div class="row">
      <div class="col-3 p-3  bg-secondary  text-white p-3">
        <div class="row">
          <div class="col sidebar">
            <div class="profile">
              <div class="profile2"></div>
              <h3>NYONDO STOCK</h3>
            </div>
            <div class="nav">
              <div><a href="#">Dashboard</a></div>
              <div><a href="#">Sales Registration</a></div>
              <div><a href="#">Stock Registration</a></div>
              <div><a href="#">Reports</a></div>

            </div>
          </div>
        </div>
      </div>
      <div class="col-9  bg-secondary text-dark p-3">
        <div class="row p-3">
          <form action="" class="form">
            <h2 class="text-center mt-3">Stock Registration</h2>

            <div class="card p-3">
            <h2 class="text-center mt-3">Product Information</h2>
            
              <div class="row my-3">
                <div class="col">
                  <label for="stock-id">Stock ID</label>
                  <input type="text" class="form-control" id="stock-id" placeholder="Stock ID" aria-label="Stock ID">
                </div>
                <div class="col">
                  <label for="pdt-name">Product Name</label>
                  <input type="text" class="form-control" id="pdt-name" placeholder="Product name"
                    aria-label="Product name">
                </div>
              </div>
              <div class="row my-3">
                <div class="col">
                  <label for="category">Category</label>
                  <select class="form-select category" aria-label="Default select example">
                    <option selected> Select Category</option>
                    <option value="Machinery">Machinery</option>
                    <option value="Electronics">Electronics</option>
                    <option value="Finishing-pdts">Finishing Products</option>
                  </select>
                </div>
                <div class="col">
                  <label for="producer/brand">Producer/Brand</label>
                  <input type="text" class="form-control" id="producer/brand" placeholder="Producer/Brand"
                    aria-label="Producer/Brand">
                </div>

              </div>

              <div class="row my-3">
                <div class="col">
                  <label for="description">Product Description</label>
                  <textarea class="form-control" id="description" placeholder="Product description"
                    aria-label="Product description"></textarea>
                </div>
              </div>
            </div>
            <div class="card p-3 my-3">
            <div class="row my-3">
              <h2 class="text-center my-3">Inventory Details</h2>

              <div class="row my-3">
                <div class="col">
                  <label for="unit">Measurement Unit</label>
                  <select class="form-select unit" aria-label="Default select example">
                    <option selected> Select Measurement Unit</option>
                    <option value="kg">Kg</option>
                    <option value="liters">Liters</option>
                    <option value="pieces">Pieces</option>
                    <option value="meters">Meters</option>
                    <option value="boxes">Boxes</option>
                  </select>
                </div>
                <div class="col">
                  <label for="barcode-number">Barcode Number</label>
                  <input type="number" class="form-control" id="barcode-number" placeholder="Barcode Number"
                    aria-label="Barcode Number">
                </div>
                <div class="col">
                  <label for="storage-location">Storage Location/Shelf</label>
                  <select class="form-select storage-location" aria-label="Default select example">
                    <option selected> Select Storage Location</option>
                    <option value="A1">A1</option>
                    <option value="B2">B2</option>
                    <option value="C3">C3</option>
                    <option value="D4">D4</option>
                    <option value="E5">E5</option>
                  </select>

                </div>
              </div>
              <div class="row my-3">
                <div class="col">
                  <label for="date-added">Date Added</label>
                  <input type="date" class="form-control" id="date-added" aria-label="Date added">
                </div>

                <div class="col">
                  <label for="quantity">Quantity in Stock</label>
                  <input type="number" class="form-control" id="quantity" placeholder="Quantity" aria-label="Quantity">
                </div>
                <div class="col">
                  <label for="reorder-level">Reorder Level</label>
                  <input type="number" class="form-control" id="reorder-level" placeholder="Reorder Level"
                    aria-label="Reorder Level">
                </div>
              </div>
            </div>
            </div>

            <div class="card p-3 my-3">
            <div class="row">
              <h2 class="text-center my-3">Pricing Information</h2>
              <div class="col">
                <label for="unit-price">Unit Price</label>
                <input type="number" class="form-control" id="unit-price" placeholder="Unit Price"
                  aria-label="Unit Price">
              </div>
              <div class="col">
                <label for="selling-price">Selling Price</label>
                <input type="number" class="form-control" id="selling-price" placeholder="Selling Price"
                  aria-label="Selling Price">
              </div>
            </div>
            </div>

            <div class="card p-3 my-3">
            <div class="row">
              <h2 class="text-center my-3">Supplier Information</h2>
              <div class="col">
                <label for="supplier">Supplier</label>
                <input type="text" class="form-control" id="supplier" placeholder="Enter supplier name"
                  aria-label="Supplier">
              </div>
              <div class="col">
                <label for="supplier-contact">Supplier Contact</label>
                <input type="number" class="form-control" id="supplier-contact" placeholder="Supplier Contact"
                  aria-label="Supplier Contact">
              </div>
            </div>
            </div>
            <div class="row">
              <div class="col my-3"> <button type="button" class="btn btn-primary btn-sm">Cancel</button></div>
              <div class="col my-3">
                <button type="button" class="btn btn-success btn-sm">Register-Stock</button>
              </div>
            </div>
        </div>
      </div>
      </form>

    </div>

  </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
</body>

</html>
