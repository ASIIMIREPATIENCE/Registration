<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registration form 2</title>
    <link rel="stylesheet" href="../styles/supplier-reg.css" />
  </head>
  <body>
    
     
      </div>

      <div class="content">
        <form class="sales-form">
          <section>
            <h1>SUPPLIER REGISTRATION FORM</h1>
            <br>
            <h1>COMPANY INFORMATION</h1>
            <div class="input-container">
              <div class="input-section">
                <label for="name">Company Name</label>
                <input type="text" id="name" required />
              </div>
              <div class="input-section">
                <label for="reg-no">Registration Number</label>
                <input
                  type="text"
                  id="reg-no"
                  placeholder="Insert Registration Number"
                  required
                />
              </div>
            </div>
            <div class="input-container">
              <div class="input-section">
                <label for="address">Address</label>
                <input
                  type="text"
                  id="address"
                  placeholder="Inset Address"
                />
              </div>
              <div class="input-section">
                <label for="contact">Contact</label>
                <input
                  type="tel"
                  id="contact"
                  placeholder="Insert Contact"
                />
          </section>

          

          <section>
            <h1>CONTACT INFORMATION</h1>
            <div class="input-container">
              <div class="input-section">
                <label for="contact-person">Contact Person</label>
                <input
                  type="text"
                  id="contact-person"
                  placeholder="Insert Contact Person"
                />
              </div>
              <div class="input-section">
                <label for="Supplier-phone">Phone Number</label>
                <input
                  type="tel"
                  id="Supplier-phone"
                  placeholder="Insert phone number"
                  required
                />
              </div>
            </div>
            

            <div class="input-container">
              <div class="input-section">
                <label for="Supplier-email">Email</label>
                <input type="email" id="Supplier-email" placeholder="Enter email" />
              </div>
              <div class="input-section">
                <label for="position">Position</label>
                <select id="position" required>
                  <option>Select Position</option>
                  <option>Manager</option>
                  <option>Supervisor</option>
                  <option>Employee</option>
                </select>
              </div>
            </div>
          </section>
      
          <section>
            <h1>CATEGORIZATION</h1>
            <div class="input-container">
              <div class="input-section">
                
                <div class="input-section">
                <label for="product-category">Product Category</label>
                <select id="product-category" required>
                  <option>Select Product Category</option>
                  <option>Roofings</option>
                  <option>Finishing Products</option>
                  <option>Machinery</option>
                </select>
              </div>
              </div>
              <div class="input-section">
                <label for="duration">Years in Operation</label>
                <input
                  type="number"
                  id="duration"
                  placeholder="Insert no of years"
                  required
                />
              </div>
            </div>
            <div class="input-container">
              <div class="input-section">
                <label for="message">Brief Description of Services</label>
                <input
                  type="textbox"
                  id="address"
                  placeholder="Insert Description"
                />
              </div>
              <div class="input-section">
                <label for="geographical-reach">Geographical Reach</label>
             <select id="product-category" required>
                  <option>Select Geographical Reach</option>
                  <option>Country-wide</option>
                  <option>Global</option>
                  <option>Kampala Only</option>
                </select>
          </section>

            <section>
            <h1>FINANCIAL & PAYMENT DETAILS</h1>
            <div class="input-container">
              <div class="input-section">
                
                <div class="input-section">
                <label for="bank"> Bank</label>
                <select id="bank" required>
                  <option>Select Bank</option>
                  <option>ABSA</option>
                  <option>Stanbic Bank</option>
                  <option>Equity Bank</option>
                  <option>Centanary Bank</option>
                </select>
              </div>
              </div>
              <div class="input-section">
                <label for="acc-no">Account Number</label>
                <input
                  type="number"
                  id="acc-no"
                  placeholder="Insert account number"
                  required
                />
              </div>
            </div>
            <div class="input-container">
              <div class="input-section">
                <label for="payment-terms">Preferred Payment Terms</label>
                <select id="payment-terms" required>
                  <option>Select Payment Term</option>
                  <option>50% on Order</option>
                  <option>100% on order</option>
                  <option>100% on delivery</option>
                </select>
              </div>
              <div class="input-section">
                <label for="currency">Preferred-Currency</label>
             <select id="currency" required>
                  <option>Select Currency</option>
                  <option>UGX</option>
                  <option>USD</option>
                  <option>EURO</option>
                </select>
          </section>

          <section>
            <h1>DOCUMENTATION</h1>
            <div class="input-container">
              <div class="input-section">
                
                <div class="input-section">
                <label for="upload">Upload Insurance Certificate</label>
                <input type="file" id="upload" required />
              </div>
              </div>
              <div class="input-section">
                <label for="upload">Upload Quality Certification </label>
                <input type="file" id="upload" required
                />
              </div>
            </div>
            <div class="input-container">
              <div class="input-section">
                <label for="upload">Upload Operation Certification</label>
                <input type="file" id="upload" required
                />
              </div>
              <div class="input-section">
                <label for="checkbox">The provided information is accurate and complete to the best of my knowledge</label>
                <input type="checkbox" id="checkbox" required />
             </div>
           </div>
          </section>
          <section>
            
          </section>
           
            <div>
              <button type="reset" class="button">Cancel </button>
              <button type="submit" class="button">Register</button>
            </div>
          </section>
        </form>
      </div>
    </div>
  </body>
</html>
